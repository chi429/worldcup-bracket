<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA世界盃 · 淘汰賽</title>
<style>
  :root{
    --bg:#0a2419; --bg2:#0d3024; --card:#11352a; --line:#1d4d3a;
    --gold:#e0b34a; --gold-soft:#f3d896; --text:#f2efe2; --muted:#8fab9c;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:radial-gradient(ellipse at top,var(--bg2),var(--bg) 60%);
    color:var(--text);
    font-family:"Helvetica Neue","PingFang HK","Noto Sans HK",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    flex:0 0 auto;padding:10px 14px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(10,36,25,.98),rgba(10,36,25,.9));
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;
  }
  .brand{display:flex;align-items:baseline;gap:8px;min-width:0;}
  .brand h1{font-size:16px;margin:0;color:var(--gold-soft);font-weight:800;letter-spacing:.4px;white-space:nowrap;}
  .brand .tag{font-size:11px;color:var(--muted);white-space:nowrap;}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;gap:3px;}
  .seg button{
    border:0;background:transparent;color:var(--muted);cursor:pointer;
    font-size:13px;font-weight:800;padding:8px 16px;border-radius:999px;white-space:nowrap;
    display:flex;align-items:center;gap:6px;transition:.15s;font-family:inherit;
  }
  .seg button .en{font-size:10px;font-weight:600;opacity:.75;}
  .seg button.active{background:var(--gold);color:#1a1304;}
  .seg button:not(.active):hover{color:var(--text);}
  .stage{flex:1 1 auto;position:relative;min-height:0;}
  .stage iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg);
    opacity:0;visibility:hidden;transition:opacity .18s;
  }
  .stage iframe.show{opacity:1;visibility:visible;}
  @media(max-width:520px){
    header{padding:8px 10px;gap:8px;}
    .brand .tag{display:none;}
    .brand h1{font-size:14px;}
    .seg button{padding:7px 12px;font-size:12px;}
    .seg button .en{display:none;}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>🏆 2026 FIFA世界盃</h1>
    <span class="tag">淘汰賽 · 兩種顯示模式</span>
  </div>
  <div class="seg" id="seg">
    <button data-mode="live" class="active">⚡ 即時比分<span class="en">Live</span></button>
    <button data-mode="detail">📋 完整賽制<span class="en">Full bracket</span></button>
  </div>
</header>

<div class="stage">
  <iframe id="if-live"   data-src="live.html"          title="即時比分" class="show" loading="eager"></iframe>
  <iframe id="if-detail" data-src="worldcup-2026.html" title="完整賽制" loading="lazy"></iframe>
</div>

<script>
  const frames = {
    live:   document.getElementById("if-live"),
    detail: document.getElementById("if-detail"),
  };
  const buttons = document.querySelectorAll("#seg button");
  const loaded = {};

  function ensureLoaded(mode){
    const f = frames[mode];
    if(!loaded[mode]){ f.src = f.dataset.src; loaded[mode] = true; }
  }

  function setMode(mode){
    if(!frames[mode]) mode = "live";
    ensureLoaded(mode);
    for(const k in frames){ frames[k].classList.toggle("show", k===mode); }
    buttons.forEach(b=> b.classList.toggle("active", b.dataset.mode===mode));
    try{ localStorage.setItem("wc26-mode", mode); }catch(e){}
    if(location.hash.slice(1)!==mode) history.replaceState(null,"","#"+mode);
  }

  buttons.forEach(b=> b.onclick = ()=> setMode(b.dataset.mode));

  // Initial mode: URL hash > saved choice > default (live)
  let start = location.hash.slice(1);
  if(start!=="live" && start!=="detail"){
    try{ start = localStorage.getItem("wc26-mode") || "live"; }catch(e){ start = "live"; }
  }
  setMode(start);
</script>
</body>
</html>
