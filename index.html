// Merge live API data over the fallback for one match. Returns a "state" object.
function resolveMatch(m, liveById){
  const live = liveById[String(m.id)];
  // start from fallback
  let st = {
    hs: m.fb.hs, as: m.fb.as,
    done: !!m.fb.done, today: !!m.fb.today,
    livenow:false, pk:m.fb.pk||"", note:!!m.fb.note,
    winner:m.fb.winner||null, source:"fallback"
  };
  if(live){
    const hs = parseInt(live.home_score);
    const as = parseInt(live.away_score);
    const finished = String(live.finished).toUpperCase()==="TRUE";
    const elapsed = String(live.time_elapsed||"").toLowerCase();
    const hasScore = !isNaN(hs) && !isNaN(as);
    const started = finished || (elapsed && elapsed!=="notstarted");
    // Only override if the API actually has meaningful score/status data
    if(hasScore && started){
      st.hs = hs; st.as = as; st.source="live";
      if(finished){
        st.done = true; st.today=false; st.livenow=false;
        st.winner = hs>as ? "home" : (as>hs ? "away" : (st.winner||null));
      }else{
        st.livenow = true; st.today=false; st.done=false;
      }
    }
  }
  return st;
}

function teamRow(team, score, cls, tid, target){
  const flag = team.flag ? `<span class="flag">${team.flag}</span>` : "";
  const scoreHtml = (score===null||score===undefined||score==="") ? "" : `<span class="score">${score}</span>`;
  const canTap = !!(tid && TEAM_GAMES[tid] && TEAM_GAMES[tid].some(g=>g.finished==="TRUE"));
  const cls2 = "team " + cls + (canTap ? " tappable" : "");
  const dt = canTap ? ` data-target="${target}"` : "";
  return `<div class="${cls2}"${dt}><span class="name">${flag}${team.name}</span>${scoreHtml}</div>`;
}

function formatHK(iso){
  const d=new Date(iso);
  const p={};
  new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Hong_Kong",month:"numeric",day:"numeric",
    hour:"2-digit",minute:"2-digit",hourCycle:"h23",weekday:"short"}).formatToParts(d).forEach(x=>p[x.type]=x.value);
  const wd={Mon:"一",Tue:"二",Wed:"三",Thu:"四",Fri:"五",Sat:"六",Sun:"日"};
  return `${p.month}/${p.day}(${wd[p.weekday]||p.weekday}) ${p.hour}:${p.minute}`;
}
function cdText(iso, done, live){
  if(done||live) return {t:"",soon:false};
  let diff = new Date(iso).getTime() - Date.now();
  if(diff<=0) return {t:"即將開賽",soon:true};
  const day=86400000,hr=3600000,mn=60000;
  const d=Math.floor(diff/day); diff-=d*day;
  const h=Math.floor(diff/hr); diff-=h*hr;
  const m=Math.floor(diff/mn);
  let t;
  if(d>0) t=`⏳ ${d}日${h}小時後開賽`;
  else if(h>0) t=`⏳ ${h}小時${m}分後開賽`;
  else t=`⏳ ${m}分鐘後開賽`;
  return {t, soon:(d===0)};
}
function tickCd(){
  document.querySelectorAll(".cd").forEach(el=>{
    const r=cdText(el.dataset.ko, el.dataset.done==="1", el.dataset.live==="1");
    el.textContent=r.t;
    el.classList.toggle("soon", !!r.soon);
  });
}

function resolveTeam(m, side, g){
  const isH = side==="home";
  const tid = g ? (isH? g.home_team_id : g.away_team_id) : null;
  const en  = g ? (isH? g.home_team_name_en : g.away_team_name_en) : null;
  if(tid && tid!=="0" && tid!=="null" && (ZH[tid]||en)){
    return { name: ZH[tid] || en, flag: FLAG[tid] || (m[side]&&m[side].flag) || "" };
  }
  return m[side] || {name:"—", flag:""};
}

function stageLabel(g){
  if(g.type==="group") return "分組"+(g.matchday?("第"+g.matchday+"輪"):"");
  const id=+g.id;
  if(id<=88) return "32強"; if(id<=96) return "16強"; if(id<=100) return "8強";
  if(id<=102) return "4強"; if(id===103) return "季軍戰"; return "決賽";
}
function zhName(tid, en){ return ZH[tid] || en || "—"; }
function hasFinished(tid){ return !!(tid && TEAM_GAMES[tid] && TEAM_GAMES[tid].some(g=>g.finished==="TRUE")); }
function journeyHTML(tid){
  if(!tid) return "";
  const games=(TEAM_GAMES[tid]||[]).filter(g=>g.finished==="TRUE").sort((a,b)=>(+a.id)-(+b.id));
  if(!games.length) return `<div class="jr-empty">暫無完賽記錄</div>`;
  let rows="";
  games.forEach(g=>{
    const isH = g.home_team_id===tid;
    const own = isH? g.home_score : g.away_score;
    const opp = isH? g.away_score : g.home_score;
    const oppId = isH? g.away_team_id : g.home_team_id;
    const oppEn = isH? g.away_team_name_en : g.home_team_name_en;
    const o=parseInt(own), p=parseInt(opp);
    let tag="和", c="d";
    if(o>p){tag="勝";c="w";} else if(o<p){tag="負";c="l";}
    const sc = (isNaN(o)||isNaN(p)) ? "—" : `${own}-${opp}`;
    rows += `<div class="jr-row"><span class="jr-st">${stageLabel(g)}</span><span class="jr-vs">對 ${zhName(oppId,oppEn)}</span><span class="jr-sc ${c}">${sc} ${tag}</span></div>`;
  });
  return rows;
}

function parseScorers(s){
  if(!s || s==="null") return [];
  const out=[]; const re=/["“”]([^"“”]+)["“”]/g; let m;
  while((m=re.exec(s))!==null){ out.push(m[1].trim()); }
  return out;
}
function liveMinute(g){
  if(!g || !g.time_elapsed) return "";
  const te=String(g.time_elapsed);
  if(/^\d+$/.test(te)) return te+"'";
  const low=te.toLowerCase();
  if(low==="ht") return "半場";
  if(low==="notstarted"||low==="finished"||low==="live") return "";
  return te;
}

function renderFocus(liveById){
  const box=document.getElementById("focus");
  if(!box) return;
  const items=MATCHES.map(m=>({m, st:resolveMatch(m, liveById), g:liveById[String(m.id)]}));
  const live=items.filter(x=>x.st.livenow);
  const now=Date.now();
  const upcoming=items
    .filter(x=>!x.st.livenow && !x.st.done && x.m.ko && (new Date(x.m.ko).getTime() > now - 3*3600000))
    .sort((a,b)=> new Date(a.m.ko) - new Date(b.m.ko));
  let html=`<div class="focus-head">🎯 焦點賽事</div>`;
  if(live.length){
    html += live.map(x=>liveCardHTML(x.m, x.st, x.g)).join("");
  }
  const nextN=upcoming.slice(0,4);
  if(nextN.length){
    html += `<div class="focus-sub">接下來（依港時由近至遠）</div>`;
    html += nextN.map(x=>focusRow(x.m, x.g)).join("");
  }
  if(!live.length && !nextN.length){
    html += `<div class="focus-sub">🏆 淘汰賽已全部完成</div>`;
  }
  box.innerHTML=html;
}

function goalPlayer(entry){
  let s=String(entry).trim();
  s=s.replace(/\s+\d+(\+\d+)?\s*['’]?\s*(\(?pen\.?\)?|\(?p\)?|\(?og\)?|o\.?g\.?)?$/i,"").trim();
  return s;
}
function addGoal(tally, entry, tid){
  const name=goalPlayer(entry);
  if(!name) return;
  const key=name+"|"+tid;
  if(!tally[key]) tally[key]={name, tid, goals:0};
  tally[key].goals++;
}

function scorerBoardHTML(liveById){

function render(liveById){
  const main = document.getElementById("main");
  main.innerHTML = "";
  for(let r=0; r<5; r++){
    const sec = document.createElement("section");
    sec.className = "round";
    sec.innerHTML = `<div class="round-head"><h2>${ROUND_META[r].title}</h2><span>${ROUND_META[r].note}</span></div>`;
    MATCHES.filter(m=>m.round===r)
      .slice()
      .sort((a,b)=>{  // closest kickoff to the current time first; TBD matches last
        const now=Date.now();
        const da=a.ko?Math.abs(new Date(a.ko).getTime()-now):Infinity;
        const db=b.ko?Math.abs(new Date(b.ko).getTime()-now):Infinity;
        return da-db;
      })
      .forEach(m=>{
      const st = resolveMatch(m, liveById);
      const g = liveById[String(m.id)];
      const homeId = g ? g.home_team_id : null;
      const awayId = g ? g.away_team_id : null;
      const homeT = resolveTeam(m,"home",g);
      const awayT = resolveTeam(m,"away",g);
      const homePanel = hasFinished(homeId)?`<div class="journey" id="jr-${m.id}-h" hidden>${journeyHTML(homeId)}</div>`:"";
      const awayPanel = hasFinished(awayId)?`<div class="journey" id="jr-${m.id}-a" hidden>${journeyHTML(awayId)}</div>`:"";
      let cls="tbd", badge=`<span class="badge tbd">未開賽</span>`;
      if(st.livenow){cls="livenow"; badge=`<span class="badge livenow">● 進行中</span>`;}
      else if(st.done){cls="done"; badge=st.pk&&/PK/.test(st.pk)?`<span class="badge pk">PK大戰</span>`:`<span class="badge done">已完場</span>`;}
      else if(st.today){cls="today"; badge=`<span class="badge today">今日</span>`;}

      let hs="–", as="–", hCls="", aCls="";
      if(st.done||st.livenow){
        hs = (st.hs??"–"); as = (st.as??"–");
        if(st.done && st.winner==="home"){hCls="winner"; aCls="loser";}
        else if(st.done && st.winner==="away"){hCls="loser"; aCls="winner";}
      } else if(st.today){ hs="–"; as="–"; }
      else { hs=""; as=""; }

      const pkNote = st.pk ? `<div class="pk-note">⚽ ${st.pk}</div>` : "";
      const koNote = m.ko ? `<div class="kickoff"><span class="ko-t">🕒 港時 ${formatHK(m.ko)}</span><span class="cd" data-ko="${m.ko}" data-done="${st.done?1:0}" data-live="${st.livenow?1:0}"></span></div>` : "";
      const nextNote = m.next ? `<div class="next">${m.next}</div>` : "";
      const trophy = m.isFinal ? `<div class="trophy">🏆</div>` : "";
      const cardCls = m.isFinal ? `match ${cls} final-card` : `match ${cls}`;

      sec.innerHTML += `
        <div class="${cardCls}">
          ${trophy}
          <div class="meta"><span>${m.label}</span>${badge}</div>
          <div class="teams">
            ${teamRow(homeT, (st.done||st.livenow)?hs:(st.today?"–":""), hCls, homeId, "jr-"+m.id+"-h")}
            ${homePanel}
            ${teamRow(awayT, (st.done||st.livenow)?as:(st.today?"–":""), aCls, awayId, "jr-"+m.id+"-a")}
            ${awayPanel}
          </div>
          ${koNote}${pkNote}${nextNote}
        </div>`;
    });

  renderFocus(liveById);

  tickCd();
}

function fmtTime(){
  const d=new Date();
  return d.toLocaleTimeString("zh-HK",{hour:"2-digit",minute:"2-digit"});
}

async function loadLive(){
  setStatus("loading","正在載入最新比數…");
  try{
    const res = await fetch(API_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    // API may wrap games in {games:[...]}, {data:[...]}, or return array directly
    let arr = Array.isArray(data) ? data
            : Array.isArray(data.games) ? data.games
            : Array.isArray(data.data) ? data.data
            : Array.isArray(data.result) ? data.result : [];
    // some responses wrap each item as {game:{...}}
    arr = arr.map(x => x && x.game ? x.game : x).filter(Boolean);
    const byId = {};
    arr.forEach(g=>{ if(g && g.id!=null) byId[String(g.id)] = g; });
    const tg={};
    arr.forEach(g=>{
      if(g.home_team_id){(tg[g.home_team_id]=tg[g.home_team_id]||[]).push(g);}
      if(g.away_team_id){(tg[g.away_team_id]=tg[g.away_team_id]||[]).push(g);}
    });
    TEAM_GAMES = tg;
    if(Object.keys(byId).length===0) throw new Error("no games in response");
    render(byId);
    setStatus("ok", `已更新最新比數 · ${fmtTime()}`);
    document.getElementById("footer").innerHTML =
      "比數由免費開放資料來源自動更新。如來源暫時無法連接，會顯示已儲存的最後正確賽果。淘汰賽對賽組合按FIFA官方賽程(第73–104場)。";
  }catch(err){
    render({}); // fallback only
    setStatus("stale", `暫時無法連接即時資料 · 顯示已儲存賽果`);
    document.getElementById("footer").innerHTML =
      "⚠️ 即時資料來源暫時無法連接，以下為已儲存的最後正確賽果。可稍後按「重新整理」再試。";
  }
}

  document.querySelectorAll("#nav button").forEach((b,i)=>b.classList.toggle("active",i===idx));
}
// Which round column is currently in view. Uses each column's own offset/width
// so it stays correct on wide desktops (where a column is capped at 430px but
// the scroll container is much wider — clientWidth-based math mis-selects there).
function currentRoundIndex(){
  const main=document.getElementById("main");
  const rounds=document.querySelectorAll(".round");
  let idx=0, best=Infinity;
  rounds.forEach((r,i)=>{
    const d=Math.abs(r.offsetLeft - main.scrollLeft);
    if(d<best){ best=d; idx=i; }
  });
  return idx;
}
function wireNav(){
  const buttons=document.querySelectorAll("#nav button");
  const main=document.getElementById("main");
  const rounds=document.querySelectorAll(".round");
  buttons.forEach(btn=>{
    btn.onclick=()=>{
      const i=parseInt(btn.dataset.i);
      rounds[i].scrollIntoView({behavior:"smooth",inline:"start",block:"nearest"});
      // Also reset the page's vertical scroll so the chosen round starts at its
      // top — otherwise switching tabs keeps you scrolled midway down.
      window.scrollTo({top:0,behavior:"smooth"});
      setActiveTab(i); // reflect selection immediately, don't wait for scroll
    };
  });
  main.onscroll=()=>{ setActiveTab(currentRoundIndex()); };
}

document.getElementById("refresh-btn").onclick=loadLive;

// Back-to-top floating button: show once the page is scrolled down a bit.
const toTop=document.getElementById("to-top");
toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
function updateToTop(){ toTop.classList.toggle("show", window.scrollY>300); }
window.addEventListener("scroll", updateToTop, {passive:true});
updateToTop();

loadLive();
setInterval(tickCd, 30000);
document.addEventListener("click", function(e){
  const t = e.target.closest(".team.tappable");
  if(!t) return;
  const p = document.getElementById(t.dataset.target);
  if(p){ p.hidden = !p.hidden; t.classList.toggle("open", !p.hidden); }
});
</script>
