<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup — Bracket &amp; Views</title>
<style>
  :root{
    --bg:#0b1b12; --panel:#10241a; --panel2:#15301f; --line:#254a35;
    --text:#eafff2; --muted:#8fb7a1; --gold:#f5c542; --green:#1f9d5b;
    --win:#1f9d5b; --live:#e6533c; --card:#13291d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#08150e,#0b1b12 40%);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  header{padding:28px 24px 10px;text-align:center}
  header h1{margin:0;font-size:26px;letter-spacing:.3px}
  header h1 .tro{color:var(--gold)}
  header .sub{color:var(--muted);font-size:13px;margin-top:6px}
  header .asof{display:inline-block;margin-top:10px;font-size:12px;color:var(--gold);
    border:1px solid var(--line);padding:4px 10px;border-radius:20px;background:var(--panel)}
  .statusbar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;font-size:12px}
  .sdot{width:8px;height:8px;border-radius:50%;flex:none}
  .sdot.ok{background:var(--green)}
  .sdot.stale{background:#e0912f}
  .sdot.loading{background:var(--muted);animation:sblink 1.2s infinite}
  @keyframes sblink{0%,100%{opacity:1}50%{opacity:.35}}
  #stext{color:var(--muted)}
  #refreshBtn,#langBtn{background:var(--panel);border:1px solid var(--line);color:var(--gold);
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer}
  #langBtn{color:var(--text)}
  #refreshBtn:active,#langBtn:active{transform:scale(.96)}
  nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:16px 12px 4px;position:sticky;top:0;
    background:rgba(8,21,14,.92);backdrop-filter:blur(6px);z-index:20}
  nav button{background:var(--panel);color:var(--muted);border:1px solid var(--line);
    padding:9px 16px;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;transition:.15s}
  nav button:hover{color:var(--text)}
  nav button.active{background:var(--gold);color:#20160a;border-color:var(--gold)}
  main{padding:18px 20px 60px;max-width:1500px;margin:0 auto}
  .view{display:none}
  .view.active{display:block}
  .hint{color:var(--muted);font-size:13px;margin:0 0 16px;text-align:center}

  /* ---------- BRACKET ---------- */
  .bracket-wrap{overflow-x:auto;padding-bottom:16px}
  .bracket{display:flex;gap:44px;min-width:1480px;align-items:stretch;position:relative}
  #bracketEl>svg.conns{position:absolute;left:0;top:0;pointer-events:none;z-index:0}
  .round{display:flex;flex-direction:column;justify-content:space-around;flex:1;min-width:210px;position:relative;z-index:1}
  .round-title{position:sticky;top:64px;text-align:center;font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:700}
  .match{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    margin:9px 0;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.25)}
  .match .row{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:14px}
  .match .row+.row{border-top:1px solid var(--line)}
  .match .flag{font-size:17px;width:22px;text-align:center;flex:none}
  .match .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .match .sc{font-variant-numeric:tabular-nums;font-weight:700;color:var(--muted);min-width:16px;text-align:center}
  .match .row.win .nm{font-weight:700;color:#fff}
  .match .row.win .sc{color:var(--gold)}
  .match .row.win{background:linear-gradient(90deg,rgba(31,157,91,.18),transparent)}
  .match .row.lose{opacity:.55}
  .match .row.tbd .nm{color:var(--muted);font-style:italic}
  .match .meta{font-size:10.5px;color:var(--muted);padding:5px 10px;background:var(--panel);
    display:flex;justify-content:space-between;gap:6px;border-top:1px solid var(--line)}
  .match .meta .mt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pens{font-size:10px;color:var(--gold);padding:5px 10px;background:var(--panel);line-height:1.2}
  .tag-live{color:var(--live);font-weight:700}
  .final .match{border-color:var(--gold);box-shadow:0 0 18px rgba(245,197,66,.25)}
  .champ{margin-top:14px;text-align:center;background:var(--panel);border:1px dashed var(--line);
    border-radius:10px;padding:14px}
  .champ .lbl{font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase}
  .champ .who{font-size:18px;margin-top:6px;color:var(--muted)}

  /* ---------- GROUPS ---------- */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .grp{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .grp h3{margin:0;padding:11px 14px;font-size:15px;background:var(--panel2);
    display:flex;justify-content:space-between;align-items:center}
  .grp h3 span{font-size:11px;color:var(--muted);font-weight:500}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 8px;text-align:center}
  th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  td.team{text-align:left;white-space:nowrap}
  tbody tr{border-top:1px solid var(--line)}
  .pos{color:var(--muted);width:18px}
  .q1 td.team::after,.q2 td.team::after,.q3 td.team::after{
    font-size:9px;padding:1px 5px;border-radius:8px;margin-left:6px;vertical-align:middle;font-weight:700}
  .q1 td.team::after{color:#20160a;background:var(--gold)}
  .q2 td.team::after{color:#eafff2;background:var(--green)}
  .q3 td.team::after{color:#eafff2;background:#2f6f8f}
  body[data-lang="en"] .q1 td.team::after{content:"1st"}
  body[data-lang="en"] .q2 td.team::after{content:"2nd"}
  body[data-lang="en"] .q3 td.team::after{content:"3rd ✓"}
  body[data-lang="zh"] .q1 td.team::after{content:"首名"}
  body[data-lang="zh"] .q2 td.team::after{content:"次名"}
  body[data-lang="zh"] .q3 td.team::after{content:"第三 ✓"}
  tr.qual td.pts{color:var(--gold);font-weight:700}
  tr.out{opacity:.5}
  .grp .fnote{font-size:10px;color:var(--muted);padding:6px 12px;border-top:1px solid var(--line)}

  /* ---------- PATH ---------- */
  .team-picker{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px}
  .team-picker button{background:var(--panel);color:var(--text);border:1px solid var(--line);
    padding:6px 11px;border-radius:20px;font-size:12.5px;cursor:pointer;transition:.12s}
  .team-picker button:hover{border-color:var(--gold)}
  .team-picker button.sel{background:var(--gold);color:#20160a;border-color:var(--gold);font-weight:700}
  .team-picker button.eliminated{opacity:.4;text-decoration:line-through}
  .path{max-width:640px;margin:0 auto}
  .path .step{display:flex;gap:14px;align-items:stretch}
  .path .rail{display:flex;flex-direction:column;align-items:center;width:20px;flex:none}
  .path .dot{width:14px;height:14px;border-radius:50%;background:var(--line);border:2px solid var(--line);margin-top:20px}
  .path .dot.done{background:var(--gold);border-color:var(--gold)}
  .path .dot.now{background:var(--live);border-color:var(--live)}
  .path .bar{flex:1;width:2px;background:var(--line)}
  .path .card2{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:12px}
  .path .card2 .rnd{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
  .path .card2 .vs{font-size:15px;margin:5px 0 3px;font-weight:600}
  .path .card2 .res{font-size:12.5px;color:var(--muted)}
  .path .card2.won{border-color:var(--green)}
  .path .card2.lost{border-color:var(--live);opacity:.85}
  .path .card2 .badge{float:right;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700}
  .path .card2.won .badge{background:var(--green);color:#fff}
  .path .card2.lost .badge{background:var(--live);color:#fff}
  .path .card2.pending .badge{background:var(--panel2);color:var(--muted)}
  .path-head{text-align:center;margin-bottom:14px;font-size:20px}

  /* ---------- SCHEDULE ---------- */
  .sched{max-width:820px;margin:0 auto}
  .day{margin-bottom:18px}
  .day h4{margin:0 0 8px;font-size:13px;color:var(--gold);border-bottom:1px solid var(--line);
    padding-bottom:6px;letter-spacing:.5px}
  .fx{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:9px;padding:9px 12px;margin-bottom:7px;font-size:14px}
  .fx .rc{font-size:10px;color:#20160a;background:var(--muted);padding:2px 7px;border-radius:6px;
    font-weight:700;flex:none;width:52px;text-align:center}
  .fx .rc.r32{background:#5a8f6f}.fx .rc.r16{background:var(--gold)}
  .fx .rc.qf{background:#e0912f}.fx .rc.sf{background:#d0603f}.fx .rc.f{background:#c33;color:#fff}
  .fx .side{flex:1;display:flex;align-items:center;gap:7px}
  .fx .side.a{justify-content:flex-end;text-align:right}
  .fx .side .fg{font-size:16px}
  .fx .mid{font-variant-numeric:tabular-nums;font-weight:700;color:var(--gold);min-width:58px;text-align:center}
  .fx .venue{flex:none;color:var(--muted);font-size:11px;width:150px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fx .w{font-weight:700}
  .fx .l{opacity:.6}
  .fx.pending .mid{color:var(--muted)}
  @media(max-width:640px){.fx .venue{display:none}.fx .time{display:none}}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:20px}
  footer a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <h1 id="h1El"></h1>
  <div class="sub" id="subEl"></div>
  <div class="asof" id="asofEl"></div>
  <div class="statusbar">
    <span class="sdot loading" id="sdot"></span>
    <span id="stext">連接即時資料中…</span>
    <button id="refreshBtn">重新整理 Refresh</button>
    <button id="langBtn"></button>
  </div>
</header>

<nav>
  <button data-v="bracket" class="active"></button>
  <button data-v="groups"></button>
  <button data-v="path"></button>
  <button data-v="schedule"></button>
</nav>

<main>
  <section id="bracket" class="view active">
    <p class="hint" id="hint-bracket"></p>
    <div class="bracket-wrap"><div class="bracket" id="bracketEl"></div></div>
    <div class="champ"><div class="lbl" id="champLbl"></div><div class="who" id="champEl"></div></div>
  </section>

  <section id="groups" class="view">
    <p class="hint" id="hint-groups"></p>
    <div class="groups" id="groupsEl"></div>
  </section>

  <section id="path" class="view">
    <p class="hint" id="hint-path"></p>
    <div class="team-picker" id="pickerEl"></div>
    <div class="path" id="pathEl"></div>
  </section>

  <section id="schedule" class="view">
    <p class="hint" id="hint-schedule"></p>
    <div class="sched" id="schedEl"></div>
  </section>
</main>

<footer id="footEl"></footer>

function hkParts(iso){const p={};
  new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Hong_Kong",month:"numeric",day:"numeric",
    hour:"2-digit",minute:"2-digit",hourCycle:"h23",weekday:"short"})
    .formatToParts(new Date(iso)).forEach(x=>p[x.type]=x.value);return p;}
function hkWd(p){return LANG==="zh"?(WD[p.weekday]||p.weekday):p.weekday;}
function hkDate(iso){if(!iso)return"";const p=hkParts(iso);return `${p.month}/${p.day}(${hkWd(p)})`;}
function hkTime(iso){if(!iso)return"";const p=hkParts(iso);return `${p.hour}:${p.minute}`;}
function hkDateTime(iso){if(!iso)return"";const p=hkParts(iso);return `${p.month}/${p.day}(${hkWd(p)}) ${p.hour}:${p.minute}`;}

/* resolve a match slot to a team key (or null if unknown) */
function slot(m,side){
  const t = side==="a"?m.a:m.b;
  if(t) return t;
  const f = side==="a"?m.fa:m.fb;
  if(f && M[f] && M[f].w) return M[f].w;
  return null;
}
function slotLabel(m,side){
  const f = side==="a"?m.fa:m.fb;
  const t = slot(m,side);
  if(t) return {team:t};
  return {tbd:true,label: f ? L(f+" 勝方","Winner "+f) : L("待定","TBD")};
}

// Draw SVG elbow connectors from each feeder match to its parent match.
// Uses live element positions so it's robust to card height / spacing.
function drawConnectors(){
  const wrap=document.getElementById("bracketEl"); if(!wrap) return;
  const old=wrap.querySelector("svg.conns"); if(old) old.remove();
  const w=wrap.scrollWidth, h=wrap.scrollHeight;
  if(!w || !h || wrap.offsetParent===null) return;   // not visible yet
  const base=wrap.getBoundingClientRect();
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("class","conns");
  svg.setAttribute("width",w); svg.setAttribute("height",h);
  svg.setAttribute("viewBox",`0 0 ${w} ${h}`);
  const cardOf=id=>wrap.querySelector(`.match[data-mid="${id}"]`);
  const pos=el=>{const r=el.getBoundingClientRect();
    return {l:r.left-base.left, r:r.right-base.left, cy:r.top-base.top+r.height/2};};
  Object.keys(M).forEach(pid=>{
    const pm=M[pid]; if(!pm.fa && !pm.fb) return;
    const pcard=cardOf(pid); if(!pcard) return;
    const pp=pos(pcard);
    [pm.fa,pm.fb].forEach(cid=>{
      if(!cid) return; const cc=cardOf(cid); if(!cc) return;
      const cp=pos(cc); const midX=(cp.r+pp.l)/2;
      const path=document.createElementNS(NS,"path");
      path.setAttribute("d",`M ${cp.r} ${cp.cy} H ${midX} V ${pp.cy} H ${pp.l}`);
      path.setAttribute("fill","none");
      path.setAttribute("stroke", (M[cid]&&M[cid].w) ? "rgba(224,179,74,.6)" : "#2f5a41");
      path.setAttribute("stroke-width","2");
      svg.appendChild(path);
    });
  });
  wrap.insertBefore(svg, wrap.firstChild);
}
function matchCard(m,id){
  const d=document.createElement("div"); d.className="match"; d.dataset.mid=id;
  d.appendChild(sideRow(m,"a")); d.appendChild(sideRow(m,"b"));
  if(m.pens) {const p=document.createElement("div");p.className="pens";
    p.textContent=L(`十二碼 ${m.pens[0]}–${m.pens[1]}`,`Penalties ${m.pens[0]}–${m.pens[1]}`);d.appendChild(p);}
  const meta=document.createElement("div"); meta.className="meta";
  const dt = KO[id] ? hkDateTime(KO[id]) : `${m.date||""}${m.time?" · "+m.time:""}`;
  const left = m.st==="live"
    ? `<span class="tag-live">${L("● 今日","● TODAY")}</span> ${dt}`
    : dt;
  meta.innerHTML=`<span class="mt">${left}</span><span class="mt">${m.venue||""}</span>`;
  d.appendChild(meta);
  return d;
}
function sideRow(m,side){
  const info=slotLabel(m,side);

  if(m.w){ r.classList.add(m.w===t?"win":"lose"); }

}

const PARENT={};
Object.keys(M).forEach(id=>{const m=M[id];
  if(m.fa)PARENT[m.fa]=id; if(m.fb)PARENT[m.fb]=id;});
// R32 match containing each team
const FIRST={};
ORDER.R32.forEach(id=>{const m=M[id]; if(m.a)FIRST[m.a]=id; if(m.b)FIRST[m.b]=id;});

function isEliminated(tk){
  // eliminated if any match on the path was played and team was not the winner
  let id=FIRST[tk];
  while(id){
    const m=M[id];
    // is team actually in this match (as resolved slot)?
    const a=slot(m,"a"), b=slot(m,"b");
    if(a!==tk && b!==tk) return true; // didn't make it this far
    if(m.w){ if(m.w!==tk) return true; }
    else return false; // reached a not-yet-decided match, still alive
    id=PARENT[id];
  }
  return false;
}

function renderPath(tk){
  const el=document.getElementById("pathEl");

  while(id){chain.push(id); id=PARENT[id];}
  let html=`<div class="path-head">${fg(tk)} <b>${nm(tk)}</b> ${L("· 晉級之路","— Route to the Final")}</div>`;
  chain.forEach((mid,i)=>{
    const m=M[mid];
    const a=slot(m,"a"), b=slot(m,"b");
    const opp = a===tk? slotLabel(m,"b") : slotLabel(m,"a");
    const oppTxt = opp.tbd? `<i style="color:var(--muted)">${opp.label}</i>` : `${fg(opp.team)} ${nm(opp.team)}`;
    let state="pending", badge=L("未賽","Upcoming"), res="";
    if(m.w){
      if(m.w===tk){state="won";badge=L("晉級","Won");}
      else{state="lost";badge=L("出局","Out");}
      const my=(a===tk?m.sa:m.sb), th=(a===tk?m.sb:m.sa);
      res=`${my}–${th}${m.pens?` (${L("十二碼","pens")} ${a===tk?m.pens[0]+"–"+m.pens[1]:m.pens[1]+"–"+m.pens[0]})`:""}`;
    } else if(m.st==="live"){state="pending";badge=L("今日","Today");}
    const dotCls = m.w?(m.w===tk?"done":"now"):(m.st==="live"?"now":"");
    html+=`<div class="step">
      <div class="rail"><div class="dot ${dotCls}"></div>${i<chain.length-1?'<div class="bar"></div>':''}</div>
      <div class="card2 ${state}"><span class="badge">${badge}</span>

        <div class="res">${res?res+" · ":""}${m.venue}</div>
      </div></div>`;
  });
  el.innerHTML=html;
}

/* ---------------- LIVE UPDATE (same free API as the live view) ---------------- */
function codeOf(m,side){const t=side==="a"?m.a:m.b;if(t)return t;
  const f=side==="a"?m.fa:m.fb;if(f&&M[f]&&M[f].w)return M[f].w;return null;}
// Merge API results over the static fallback. Processed round-by-round so that
// each round's winners propagate into the next round's feeder slots.
function mergeLive(byId){
  ["R32","R16","QF","SF","F"].forEach(rk=>{
    ORDER[rk].forEach(idk=>{
      const m=M[idk]; const g=byId[idk.slice(1)]; if(!g) return;
      const hs=parseInt(g.home_score), as=parseInt(g.away_score);
      const finished=String(g.finished).toUpperCase()==="TRUE";
      const el=String(g.time_elapsed||"").toLowerCase();
      const started=finished||(el&&el!=="notstarted");
      if(isNaN(hs)||isNaN(as)||!started) return;   // nothing meaningful yet -> keep fallback
      const ca=codeOf(m,"a"), cb=codeOf(m,"b");
      const hid=String(g.home_team_id), aid=String(g.away_team_id);
      let saV,sbV;
      if(ca&&String(ID[ca])===hid){saV=hs;sbV=as;}
      else if(ca&&String(ID[ca])===aid){saV=as;sbV=hs;}
      else if(cb&&String(ID[cb])===hid){saV=as;sbV=hs;}
      else if(cb&&String(ID[cb])===aid){saV=hs;sbV=as;}
      else {saV=hs;sbV=as;}
      m.sa=saV; m.sb=sbV;
      if(finished){ m.st="done";
        if(saV>sbV)m.w=ca; else if(sbV>saV)m.w=cb; /* draw -> penalties: keep any static winner */ }
      else { m.st="live"; m.w=null; }
    });
  });
}

}
function selectPath(pref){
  const btns=[...document.querySelectorAll("#pickerEl button")];
  let t = pref && btns.find(x=>x.dataset.tk===pref);

function setStatus(kind,text){
  const d=document.getElementById("sdot");

function nowHK(){return new Date().toLocaleTimeString("zh-HK",{hour:"2-digit",minute:"2-digit"});}
async function loadLive(){
  setStatus("loading","連接即時資料中…");
  try{
    const res=await fetch(API_URL,{cache:"no-store"});
    if(!res.ok) throw 0;
    const data=await res.json();
    let arr=Array.isArray(data)?data:(data.games||data.data||data.result||[]);
    arr=arr.map(x=>x&&x.game?x.game:x).filter(Boolean);
    const byId={}; arr.forEach(g=>{if(g&&g.id!=null)byId[String(g.id)]=g;});
    if(!Object.keys(byId).length) throw 0;
    mergeLive(byId); renderAll();
    setStatus("ok","已更新即時比數 · "+nowHK());
  }catch(e){
    renderAll(); // static fallback — never blank
    setStatus("stale","暫時無法連接即時資料 · 顯示已儲存賽果");
  }
}

  renderAll();             // bracket / route / schedule reflect current LANG + data
}

/* init */
try{ LANG = localStorage.getItem("wc26-detail-lang") || "zh"; }catch(e){ LANG="zh"; }
applyLang();             // static text + instant paint in chosen language
loadLive();              // then pull live knockout scores
setInterval(loadLive, 60000);
document.getElementById("refreshBtn").onclick=loadLive;
document.getElementById("langBtn").onclick=()=>{
  LANG = LANG==="zh" ? "en" : "zh";
  try{ localStorage.setItem("wc26-detail-lang", LANG); }catch(e){}
  applyLang();
};
</script>
</body>
</html>
